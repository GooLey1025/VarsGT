fq_dir_glob: "test_fq/*.reads{1,2}.fastq.gz"
# Glob pattern for paired-end FASTQ files.
# '*' matches the sample identifier, and '{1,2}' specifies read pairs (read1 and read2).
# Example:
#   For sample1, there are two read pairs:
#   test_fq/sample1.read1.fastq.gz
#   test_fq/sample1.read2.fastq.gz

#   For sample2, there are two read pairs:
#   test_fq/sample2.read1.fastq.gz
#   test_fq/sample2.read2.fastq.gz
# It will find all the sample names and read pairs in the directory.

# Giraffe mapping resource configuration
giraffe_mapping_memory_per_task: "100G"
giraffe_mapping_cpus_per_task: 24
giraffe_mapping_parallel_number: 5

kmc_max_parallel_number: 10
kmc_cpus_per_task: 32
kmc_memory_per_task: "50G"

# ============================================================================
# GATK-DELLY Genotyping Parameters
# ============================================================================
# Project configuration, you can customize the project name and output directory.
project: "test"
out_dir: "test"

# Reference and input files (required for genotyping)
prefix_file: "705rice_VarsGT_index/705rice_graph_prefix.txt" # Used to remove the prefix from the graph pangenome.
gbz: "705rice_VarsGT_index/Nip_42_rice.gbz" 
hapl: "705rice_VarsGT_index/Nip_42_rice.hapl"
ref_paths: "705rice_VarsGT_index/Nip.ref_order.txt"  # Optional: Reference paths file (if not provided, --ref-paths option will be omitted from vg giraffe command)
ref: "705rice_VarsGT_index/Nip.chrnum.sorted.fa"  # Reference genome FASTA file
snp_site_vcf: "705rice_VarsGT_index/705rice.snp.sites.vcf"  # SNP sites-only VCF file
indel_site_vcf: "705rice_VarsGT_index/705rice.indel.sites.vcf"  # INDEL sites-only VCF file
sv_sites_vcf: "705rice_VarsGT_index/705rice.delly.sv.sites.bcf"  # SV sites-only BCF file (generated by Delly)
snp_markers_intervals: "705rice_VarsGT_index/705rice.snp.markers.intervals"  # Interval list file for SNP genotyping
indel_markers_intervals: "705rice_VarsGT_index/705rice.indel.markers.intervals"  # Interval list file for INDEL genotyping
ref_impute_panel_vcf_path: "705rice_VarsGT_index/705rice_0.03.full.all.impute.vcf.gz" # Reference imputation panel VCF file

# Optional tool paths - if not specified, tools will be used from system PATH
# Leave empty or omit to use tools from system PATH
# !!! You need to change the java path to your own java path.
gatk_java_path: ""  # Specify Java 8 executable path for GATK UnifiedGenotyper only (GATK 3.7 requires Java 8)
java_path: ""       # Optional: specify Java executable path for Picard and other tools (can use newer Java versions)
delly_path: ""      # Optional: specify Delly executable path
bcftools_path: ""   # Optional: specify bcftools executable path
samtools_path: ""   # Optional: specify samtools executable path
tabix_path: ""      # Optional: specify tabix executable path
beagle_path: "./softwares/beagle.27Feb25.75f.jar"
vg_path: ""
picard_path: "./softwares/picard.jar"  # Path to Picard JAR file
bgzip_path: ""
kmc_path: ""

# Resource configuration for genotyping
threads: 24
gatk_memory: "100g"
beagle_memory: "100 GB"
beagle_cpus: 32
